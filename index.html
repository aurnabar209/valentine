<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Be My Valentine? 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #0d0814;
    --rose: #e8396a;
    --rose-light: #ff6b9d;
    --blush: #ffd6e7;
    --lavender: #c9b1ff;
    --glass-bg: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--bg-dark);
    font-family: 'Lato', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  #canvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 30%, rgba(232,57,106,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 70%, rgba(201,177,255,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 50% 10%, rgba(255,107,157,0.10) 0%, transparent 60%);
  }

  .card {
    position: relative; z-index: 10;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    border-radius: 28px;
    padding: 60px 52px 52px;
    text-align: center;
    max-width: 480px; width: 90%;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04),
      0 32px 80px rgba(0,0,0,0.55),
      0 0 80px rgba(232,57,106,0.08);
    animation: cardIn 0.9s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes cardIn {
    from { opacity:0; transform: translateY(36px) scale(0.96); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }

  .heart-deco {
    font-size: 2.2rem;
    letter-spacing: 8px;
    margin-bottom: 24px;
    display: block;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.12); }
  }

  .question {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.7rem, 5vw, 2.2rem);
    color: #fff;
    line-height: 1.3;
    margin-bottom: 10px;
  }
  .question em {
    font-style: italic;
    color: var(--rose-light);
  }

  .subtext {
    font-size: 0.88rem;
    color: rgba(255,255,255,0.38);
    letter-spacing: 0.04em;
    margin-bottom: 44px;
  }

  .btn-area {
    position: relative;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .btn-yes {
    padding: 14px 42px;
    border-radius: 50px;
    border: none; cursor: pointer;
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--rose) 0%, #c0185e 100%);
    color: #fff;
    box-shadow: 0 4px 28px rgba(232,57,106,0.45);
    transition: transform 0.18s, box-shadow 0.18s;
    position: relative; z-index: 2;
    letter-spacing: 0.03em;
  }
  .btn-yes:hover {
    transform: translateY(-2px) scale(1.04);
    box-shadow: 0 8px 36px rgba(232,57,106,0.6);
  }
  .btn-yes:active { transform: scale(0.97); }

  /* No button — inline by default, fixed after first escape */
  .btn-no {
    padding: 14px 36px;
    border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.18); cursor: pointer;
    font-family: 'Lato', sans-serif;
    font-size: 0.95rem;
    font-weight: 300;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.55);
    transition: background 0.18s, color 0.18s;
    position: relative; /* inline initially */
    z-index: 2;
    letter-spacing: 0.05em;
  }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 32px;
  }
  .divider span { flex:1; height:1px; background: rgba(255,255,255,0.08); }
  .divider em { font-style:normal; font-size:0.7rem; color:rgba(255,255,255,0.2); letter-spacing:0.12em; }

  .love-screen {
    display: none;
    position: fixed; inset:0; z-index:100;
    background: var(--bg-dark);
    align-items: center; justify-content: center;
    flex-direction: column;
    gap: 24px;
    animation: fadeIn 0.6s ease both;
  }
  .love-screen.active { display: flex; }

  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .love-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem,7vw,3.4rem);
    color: #fff;
    text-align: center;
    line-height: 1.25;
  }
  .love-title span { color: var(--rose-light); font-style: italic; }

  .love-hearts {
    font-size: 2.8rem;
    letter-spacing: 12px;
    animation: pulse 1.4s ease-in-out infinite;
  }

  .img-screen {
    display: none;
    position: fixed; inset:0; z-index:99;
    background: rgba(13,8,20,0.92);
    align-items: center; justify-content: center;
    animation: fadeIn 0.4s ease both;
  }
  .img-screen.active { display: flex; }

  .img-screen img {
    max-width: min(380px, 80vw);
    max-height: 70vh;
    border-radius: 20px;
    border: 2px solid var(--glass-border);
    box-shadow: 0 0 60px rgba(232,57,106,0.3);
    object-fit: cover;
    animation: imgPop 0.5s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes imgPop {
    from { opacity:0; transform: scale(0.8) rotate(-3deg); }
    to   { opacity:1; transform: scale(1) rotate(0deg); }
  }

  .img-caption {
    position: absolute;
    bottom: 60px;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-style: italic;
    color: rgba(255,255,255,0.5);
    animation: fadeIn 0.8s 0.3s ease both;
    opacity: 0;
  }

  .float-heart {
    position: fixed;
    font-size: 1.4rem;
    pointer-events: none;
    z-index: 0;
    animation: floatUp linear both;
    opacity: 0;
  }
  @keyframes floatUp {
    0%   { opacity:0.8; transform: translateY(0) scale(1); }
    100% { opacity:0;   transform: translateY(-90vh) scale(0.4); }
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="card" id="mainCard">
  <span class="heart-deco">🌸 💕 🌸</span>
  <h1 class="question">Will you be my <em>Valentine?</em></h1>
  <p class="subtext">— a question from the heart</p>
  <div class="divider"><span></span><em>choose wisely</em><span></span></div>
  <div class="btn-area" id="btnArea">
    <button class="btn-yes" id="btnYes" onclick="handleYes()">Yes 💖</button>
    <button class="btn-no"  id="btnNo"  onclick="handleNo()">No</button>
  </div>
</div>

<div class="img-screen" id="imgScreen">
  <img src="https://media1.tenor.com/m/DOXC90BeYxQAAAAd/kitten-blink.gif" alt="cute" />
  <p class="img-caption">Awww, come on… you know you want to 💕</p>
</div>

<div class="love-screen" id="loveScreen">
  <div class="love-hearts">💖 💕 💖</div>
  <h2 class="love-title">I love you <span>sooo much!</span> 🥺💗</h2>
  <p style="color:rgba(255,255,255,0.35);font-size:0.85rem;letter-spacing:0.08em;">you made the right choice ✨</p>
</div>

<script>
  /* Particle canvas */
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < 55; i++) {
    particles.push({
      x: Math.random() * 1920, y: Math.random() * 1080,
      r: Math.random() * 1.4 + 0.4,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      a: Math.random() * 0.6 + 0.1
    });
  }

  function drawParticles() {
    ctx.clearRect(0, 0, W, H);
    for (const p of particles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,182,193,${p.a})`;
      ctx.fill();
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    }
    requestAnimationFrame(drawParticles);
  }
  drawParticles();

  /* No button logic */
  let noClicks = 0;
  let hasEscaped = false;
  const btn = document.getElementById('btnNo');

  function escapeNo() {
    if (hasEscaped) return;
    hasEscaped = true;

    /* Grab current position before switching to fixed */
    const rect = btn.getBoundingClientRect();
    btn.style.position = 'fixed';
    btn.style.left = rect.left + 'px';
    btn.style.top  = rect.top  + 'px';
    btn.style.margin = '0';

    /* Small delay so the fixed reposition settles before moving */
    setTimeout(moveNo, 20);
  }

  function moveNo() {
  const card = document.getElementById('mainCard');
  const rect = card.getBoundingClientRect();

  const bw = btn.offsetWidth;
  const bh = btn.offsetHeight;

  const padding = 20;

  // Limit movement INSIDE the card
  const minX = rect.left + padding;
  const maxX = rect.right - bw - padding;

  const minY = rect.top + padding;
  const maxY = rect.bottom - bh - padding;

  const nx = Math.random() * (maxX - minX) + minX;
  const ny = Math.random() * (maxY - minY) + minY;

  btn.style.left = nx + 'px';
  btn.style.top  = ny + 'px';
}

 btn.addEventListener('mouseenter', () => {
  noClicks++; // count attempt

  if (!hasEscaped) {
    escapeNo();
  } else {
    moveNo();
  }

  if (noClicks >= 5) showImage();
});

  function handleNo() {
    
    if (!hasEscaped) {
      escapeNo();
    } else {
      moveNo();
    }
    if (noClicks >= 5) showImage();
  }

  function showImage() {
    noClicks = 0;
    const s = document.getElementById('imgScreen');
    s.classList.add('active');
    setTimeout(() => s.classList.remove('active'), 5000);
  }

  function handleYes() {
    spawnHearts();
    setTimeout(() => {
      document.getElementById('loveScreen').classList.add('active');
    }, 300);
  }

  function spawnHearts() {
    const emojis = ['💕','💖','🌸','💗','✨','💝'];
    for (let i = 0; i < 18; i++) {
      const el = document.createElement('div');
      el.className = 'float-heart';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.bottom = '-40px';
      el.style.animationDuration = (Math.random() * 3 + 3) + 's';
      el.style.animationDelay = (Math.random() * 1.5) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 7000);
    }
  }
</script>
</body>
</html>
